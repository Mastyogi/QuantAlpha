[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --strict-markers
    --timeout=120

markers =
    asyncio: marks tests as async
    slow: marks slow load/stress tests (deselect with -m "not slow")
    integration: marks integration tests needing live services
    unit: marks pure unit tests
    negative: marks negative/failure-path tests
    load: marks performance tests
