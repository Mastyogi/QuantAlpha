; ╔══════════════════════════════════════════════════════════════╗
; ║  AI Trading Bot v5 — Supervisor Process Manager (Production) ║
; ╚══════════════════════════════════════════════════════════════╝
[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/tmp/supervisord.pid

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; ── Main trading bot ──────────────────────────────────────────────────────────
[program:trading-bot]
command=python -m src.main
directory=/app
autostart=true
autorestart=true
startsecs=10
startretries=5
stopwaitsecs=30
stdout_logfile=/app/logs/trading-bot.log
stdout_logfile_maxbytes=50MB
stderr_logfile=/app/logs/trading-bot-error.log
environment=PYTHONUNBUFFERED=1
priority=100

; ── Healthcheck watchdog ──────────────────────────────────────────────────────
[program:healthcheck]
command=/bin/bash -c "while true; do sleep 60; curl -sf http://localhost:8000/health || supervisorctl restart trading-bot; done"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/healthcheck.log
priority=300
