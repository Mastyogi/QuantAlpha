version: '3.8'

services:
  quantalpha-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantalpha-trading-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reports:/app/reports
    networks:
      - quantalpha-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  quantalpha-network:
    driver: bridge

volumes:
  logs:
  models:
  reports:
