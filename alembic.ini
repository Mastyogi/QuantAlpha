# Alembic Database Migration Configuration
# AI Trading Platform — PostgreSQL 15 + TimescaleDB

[alembic]
# Path to migration scripts
script_location = src/database/migrations

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Logging
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# Database URL — loaded from environment variable at runtime
# Override: alembic -x db_url=postgresql://... upgrade head
sqlalchemy.url = postgresql://bot:strongpassword123@localhost:5432/trading_bot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
